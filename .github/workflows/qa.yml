name: QA Pipeline
permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

on:
  push:
    branches: [master]
    paths-ignore:
      - ".github/workflows/*"
      - ".trunk/*"
      - .gitignore
      - .pre-commit-config.yaml
      - .tflint.hcl
      - LICENSE
      - README.md
      - renovate.json
  pull_request:
    types: [opened, reopened, edited, synchronize, ready_for_review]
    branches: [master]
    paths-ignore:
      - ".github/workflows/*"
      - ".trunk/*"
      - .gitignore
      - .pre-commit-config.yaml
      - .tflint.hcl
      - LICENSE
      - README.md
      - renovate.json

  workflow_dispatch:

concurrency: terragrunt-qa

defaults:
  run:
    shell: bash

env:
  AWS_DEFAULT_REGION: eu-west-1
  TF_IN_AUTOMATION: "true"

jobs:
  build_test_master:
    if: github.event.pull_request.draft == false
    name: Build test binary from master branch
    uses: dfds/shared-workflows/.github/workflows/automation-integration-test-build.yml@v2.0.1
    with:
      test-source-path: test/integration/suite
      repository: dfds/infrastructure-modules
      ref: master
      artifact-name: test-master

  build_test_feature:
    if: github.ref != 'refs/heads/master' && github.event.pull_request.draft == false
    name: Build test binary from feature branch
    uses: dfds/shared-workflows/.github/workflows/automation-integration-test-build.yml@v2.0.1
    with:
      test-source-path: test/integration/suite
      artifact-name: test-feature

  apply_test_master:
    if: github.event.pull_request.draft == false
    name: Provision from master branch
    runs-on: ubuntu-latest
    needs: build_test_master
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: dfds/infrastructure-modules
          ref: master

      - name: Install Terragrunt and OpenTofu
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 60s
        uses: gruntwork-io/terragrunt-action@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_QA_ROLE_TO_ASSUME }}
          role-session-name: run-qa-pipeline
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Load secrets
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_GITHUB_TOKEN }}
          ARM_CLIENT_ID: op://CloudEng-General/Terraform Azure App Service Principal/username # pragma: allowlist-secret
          ARM_CLIENT_SECRET: op://CloudEng-General/Terraform Azure App Service Principal/password # pragma: allowlist-secret
          ARM_SUBSCRIPTION_ID: op://CloudEng-General/Terraform Azure App Service Principal/subscription_id # pragma: allowlist-secret
          ARM_TENANT_ID: op://CloudEng-General/Terraform Azure App Service Principal/tenant_id # pragma: allowlist-secret
          TF_VAR_atlantis_github_token: op://CloudEng-General/Github account devex-sa/Tokens/atlantis-qa # pragma: allowlist-secret
          TF_VAR_docker_hub_username: op://CloudEng-General/Docker Cloud/username # pragma: allowlist-secret
          TF_VAR_docker_hub_password: op://CloudEng-General/Docker Cloud/password # pragma: allowlist-secret
          TF_VAR_eks_addon_awsebscsidriver_kms_arn: op://CloudEng-General/Hardened Account EBS Volume Shared KMS Key/arn # pragma: allowlist-secret
          TF_VAR_fluxcd_bootstrap_repo_owner_token: op://CloudEng-General/Github account devex-sa/Tokens/flux-qa # pragma: allowlist-secret
          TF_VAR_grafana_agent_api_token: op://CloudEng-General/Grafana.com - sandbox/grafana_token # pragma: allowlist-secret
          TF_VAR_grafana_agent_loki_url: op://CloudEng-General/Grafana.com - sandbox/Loki_URL # pragma: allowlist-secret
          TF_VAR_grafana_agent_loki_username: op://CloudEng-General/Grafana.com - sandbox/Loki_Username # pragma: allowlist-secret
          TF_VAR_grafana_agent_prometheus_url: op://CloudEng-General/Grafana.com - sandbox/Prometheus_URL # pragma: allowlist-secret
          TF_VAR_grafana_agent_prometheus_username: op://CloudEng-General/Grafana.com - sandbox/Prometheus_Username # pragma: allowlist-secret
          TF_VAR_grafana_agent_tempo_url: op://CloudEng-General/Grafana.com - sandbox/Tempo_URL # pragma: allowlist-secret
          TF_VAR_grafana_agent_tempo_username: op://CloudEng-General/Grafana.com - sandbox/Tempo_Username # pragma: allowlist-secret
          TF_VAR_onepassword_credentials_json: op://CloudEng-General/1Password Connect/nonprod_json # pragma: allowlist-secret
          TF_VAR_onepassword_token_for_atlantis: op://CloudEng-General/1Password Connect/nonprod_atlantis_token # pragma: allowlist-secret
          TF_VAR_onepassword_token_for_grafana: op://CloudEng-General/1Password Connect/nonprod_grafana_token # pragma: allowlist-secret
          TF_VAR_velero_ebs_csi_kms_arn: op://CloudEng-General/Hardened Account EBS Volume Shared KMS Key/arn # pragma: allowlist-secret
          SLACK_WEBHOOK: op://CloudEng-General/Slack dfds.slack.com webhooks/jdm5vktylqnczrlkkbvsveyp5e # pragma: allowlist-secret
          TF_VAR_velero_azure_subscription_id: op://CloudEng-General/Azure - Offsite Backup/qa-subscription-id # pragma: allowlist-secret
          TF_VAR_velero_azure_resource_group_name: op://CloudEng-General/Azure - Offsite Backup/qa-resource-group-name # pragma: allowlist-secret
          TF_VAR_velero_azure_storage_account_name: op://CloudEng-General/Azure - Offsite Backup/qa-storage-account-name # pragma: allowlist-secret
          TF_VAR_falco_slack_alert_webhook_url: op://CloudEng-General/Slack dfds.slack.com webhooks/hgdm4deysbaryzpqvjg6lbh2xm # pragma: allowlist-secret

      - name: Provision shared EKS S3 bucket
        run: ./src/qa-test-eks.sh apply-shared _global/eks-public-s3-bucket
      - name: Provision cluster & services
        run: ./src/qa-test-eks.sh apply-cluster eu-west-1 qa
      - name: Provision Velero S3 bucket
        run: ./src/qa-test-eks.sh apply-shared _global/s3-bucket-velero
      - name: Wait for managed node groups to become active
        run: ./src/wait-for-ngs.sh qa
      - name: Wait for auto scaling groups's instances to be in service
        run: ./src/wait-for-asgs.sh qa
      - name: Download test binary
        uses: actions/download-artifact@v8
        with:
          name: test-master
          path: /tmp
      - name: Run tests
        run: ./src/qa-test-eks.sh test-run eu-west-1 qa /tmp/test.bin
        env:
          INTEGRATION_DNS_ZONE: "qa.qa.dfds.cloud"

      - name: Send alert if job fails
        if: failure()
        uses: dfds/shared-workflows/.github/actions/automation-slack-notifier@v2.0.1
        with:
          slack_webhook: ${{ env.SLACK_WEBHOOK }}
          slack_message: "QA pipeline failed in master branch"

  apply_test_feature:
    name: Apply from feature branch
    runs-on: ubuntu-latest
    needs: [apply_test_master, build_test_feature]
    if: github.ref != 'refs/heads/master' && github.event.pull_request.draft == false
    steps:
      - name: Checkout code
