apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  values:
    customRules:
        falco_custom_rules.yaml: |-
          ${custom_rules}
    falco:
      program_output:
        enabled: true
        program: "jq '{text: .output}' | curl -d @- -X POST ${stream_webhook_url}"
