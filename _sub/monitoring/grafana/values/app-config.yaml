---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-reconciler-${deploy_name}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: helm-controller
    namespace: grafana
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${app_install_name}-helm
  namespace: flux-system
spec:
  serviceAccountName: kustomize-controller
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: "./${helm_repo_path}"
  prune: ${prune}
  postBuild:
    substitute:
      flux_cluster_name: ${cluster_name}
      flux_workload_account_id: "${workload_account_id}"
      flux_grafana_stack: ${grafana_stack}
      flux_grafana_agent_resource_memory: ${agent_resource_memory}
      flux_grafana_agent_replicas: "${agent_replicas}"
      flux_grafana_agent_storage_size: ${storage_size}
